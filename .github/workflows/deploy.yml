name: CI/CD Laravel Docker

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── JOB 1: TESTING ───────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring, bcmath, zip, gd, intl, xml

      # ✅ FIX: Build Vite assets supaya manifest.json ada saat testing
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies & build Vite
        run: |
          npm ci
          npm run build

      - name: Install Composer dependencies
        run: |
          composer install \
            --no-progress \
            --prefer-dist \
            --no-interaction

      - name: Copy & configure .env untuk testing
        run: |
          cp .env.example .env
          # Override nilai yang dibutuhkan untuk testing
          sed -i 's/^APP_ENV=.*/APP_ENV=testing/' .env
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=mysql/' .env
          sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/^DB_PORT=.*/DB_PORT=3306/' .env
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=testing/' .env
          sed -i 's/^DB_USERNAME=.*/DB_USERNAME=root/' .env
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=root/' .env

      - name: Generate app key
        run: php artisan key:generate --force

      - name: Run database migrations
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test --parallel

  # ─── JOB 2: BUILD & PUSH IMAGE ────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    outputs:
      # Output image tag SHA untuk dipakai di job deploy
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login ke GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layer Docker supaya build lebih cepat
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── JOB 3: DEPLOY KE VPS ────────────────────────────────
  deploy:
    name: Deploy ke VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      # ✅ FIX: Jangan pass GITHUB_TOKEN langsung ke SSH script
      # Buat PAT token sebagai secret terpisah, atau gunakan cara ini:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          # ✅ FIX: Pass nilai yang dibutuhkan sebagai envs, bukan inline
          envs: GITHUB_ACTOR,CR_PAT,GITHUB_REPOSITORY
          script: |
            set -e

            echo "🚀 Mulai deployment..."

            # ✅ FIX: Login GHCR pakai CR_PAT (Personal Access Token)
            # bukan GITHUB_TOKEN (tidak bisa dipakai di luar Actions runner)
            echo "$CR_PAT" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            # Masuk ke folder project
            cd ~/app

            # Pull image terbaru
            docker pull ghcr.io/$GITHUB_REPOSITORY:latest

            # Update container (zero-downtime dengan --no-deps)
            docker compose up -d --remove-orphans

            echo "⏳ Menunggu container siap..."
            sleep 10

            # ── Cek koneksi database ──────────────────────
            echo "🔍 Mengecek koneksi database..."
            MAX_RETRIES=15
            COUNT=0
            until docker compose exec -T db mysqladmin ping -h "localhost" --silent 2>/dev/null; do
              COUNT=$((COUNT+1))
              if [ $COUNT -ge $MAX_RETRIES ]; then
                echo "❌ Database gagal ready setelah $MAX_RETRIES percobaan."
                docker compose logs db --tail=50
                exit 1
              fi
              echo "⏳ Percobaan $COUNT/$MAX_RETRIES..."
              sleep 3
            done

            echo "✅ Database siap!"

            # ── Jalankan migrasi ──────────────────────────
            echo "🏃 Menjalankan migrasi..."
            docker compose exec -T app php artisan migrate --force --no-interaction

            # ── Cleanup image lama ────────────────────────
            echo "🧹 Membersihkan image lama..."
            docker image prune -f

            echo "✅ Deployment selesai!"
        env:
          # ✅ Tambahkan CR_PAT di GitHub Secrets
          # Settings → Secrets → New: CR_PAT = Personal Access Token dengan scope read:packages
          CR_PAT: ${{ secrets.CR_PAT }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY: ${{ github.repository }}